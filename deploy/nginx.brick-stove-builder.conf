# Example host nginx routes for the Dockerized app.
# The app container should publish 127.0.0.1:4174:4174.

location /brick-stove-builder/api/ {
    proxy_pass http://127.0.0.1:4174/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /brick-stove-builder/ {
    proxy_pass http://127.0.0.1:4174/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /assets/ {
    proxy_pass http://127.0.0.1:4174/assets/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}
