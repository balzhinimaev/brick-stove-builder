services:
  app:
    build:
      context: .
      args:
        VITE_APP_BASE: /brick-stove-builder/
    container_name: brick-stove-builder-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4174
      MONGODB_URI: mongodb://mongo:27017/brick-stove-builder
      # Set a stable secret so auth tokens survive restarts. Provide it via the
      # host environment or a .env file (never commit the real value).
      AUTH_SECRET: ${AUTH_SECRET:-change-me-to-a-long-random-string}
    ports:
      - "127.0.0.1:4174:4174"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - brick-stove

  mongo:
    image: mongo:7
    container_name: brick-stove-builder-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brick-stove

volumes:
  mongo-data:

networks:
  brick-stove:
    driver: bridge
